       <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <!-- ===== RAISE PO MODAL ===== -->\n          <sc-if value=\"{{ poModalOpen }}\">\n            <div onclick=\"{{ closePoModal }}\" style=\"position:fixed;inset:0;background:rgba(4,8,14,0.66);backdrop-filter:blur(3px);z-index:120;display:flex;align-items:center;justify-content:center;animation:gxfade .2s ease\">\n              <div onclick=\"{{ stop }}\" style=\"width:540px;max-width:92vw;max-height:88vh;overflow-y:auto;background:#111824;border:1px solid rgba(255,255,255,0.1);border-radius:18px;box-shadow:0 30px 80px rgba(0,0,0,0.6)\" class=\"gxscroll\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid rgba(255,255,255,0.07)\">\n                  <div><h3 style=\"font-size:17px;font-weight:600\">Raise purchase order<\u002Fh3><p style=\"font-size:11.5px;color:#5C6678;margin-top:3px\">Submitted to your manager, then director, for sign-off<\u002Fp><\u002Fdiv>\n                  <button onclick=\"{{ closePoModal }}\" style=\"width:32px;height:32px;border-radius:9px;border:1px solid rgba(255,255,255,0.08);background:transparent;color:#8B94A6;cursor:pointer;display:flex;align-items:center;justify-content:center\" style-hover=\"background:rgba(255,255,255,0.06)\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><use href=\"#ic-x\"><\u002Fuse><\u002Fsvg><\u002Fbutton>\n                <\u002Fdiv>\n                <div style=\"padding:22px 24px;display:flex;flex-direction:column;gap:16px\">\n                  <div><label style=\"display:block;font-size:11px;font-weight:600;color:#8B94A6;margin-bottom:7px\">Supplier<\u002Flabel><select value=\"{{ poForm.supplier }}\" onchange=\"{{ poFormChange.supplier }}\" style=\"width:100%;box-sizing:border-box;background:#0c121c;border:1px solid rgba(255,255,255,0.1);border-radius:9px;padding:11px 13px;font-size:13px;color:#EAEEF5;font-family:inherit;outline:none\"><sc-for list=\"{{ poSuppliers }}\" as=\"sup\" hint-placeholder-count=\"5\"><option>{{ sup }}<\u002Foption><\u002Fsc-for><\u002Fselect><\u002Fdiv>\n                  <div><label style=\"display:block;font-size:11px;font-weight:600;color:#8B94A6;margin-bottom:7px\">Description<\u002Flabel><input value=\"{{ poForm.description }}\" oninput=\"{{ poFormChange.description }}\" placeholder=\"e.g. Annual cloud hosting renewal\" style=\"width:100%;box-sizing:border-box;background:#0c121c;border:1px solid rgba(255,255,255,0.1);border-radius:9px;padding:11px 13px;font-size:13px;color:#EAEEF5;font-family:inherit;outline:none\"><\u002Fdiv>\n                  <div style=\"display:grid;grid-template-columns:2fr 1fr;gap:14px\">\n                    <div><label style=\"display:block;font-size:11px;font-weight:600;color:#8B94A6;margin-bottom:7px\">Amount<\u002Flabel><input value=\"{{ poForm.amount }}\" oninput=\"{{ poFormChange.amount }}\" placeholder=\"e.g. 4,200\" style=\"width:100%;box-sizing:border-box;background:#0c121c;border:1px solid rgba(255,255,255,0.1);border-radius:9px;padding:11px 13px;font-size:13px;color:#EAEEF5;font-family:inherit;outline:none\"><\u002Fdiv>\n                    <div><label style=\"display:block;font-size:11px;font-weight:600;color:#8B94A6;margin-bottom:7px\">Currency<\u002Flabel><select value=\"{{ poForm.cur }}\" onchange=\"{{ poFormChange.cur }}\" style=\"width:100%;box-sizing:border-box;background:#0c121c;border:1px solid rgba(255,255,255,0.1);border-radius:9px;padding:11px 13px;font-size:13px;color:#EAEEF5;font-family:inherit;outline:none\"><option>GBP<\u002Foption><option>USD<\u002Foption><option>EUR<\u002Foption><\u002Fselect><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div><label style=\"display:block;font-size:11px;font-weight:600;color:#8B94A6;margin-bottom:7px\">Justification <span style=\"color:#4A5366;font-weight:400\">(optional)<\u002Fspan><\u002Flabel><input value=\"{{ poForm.justification }}\" oninput=\"{{ poFormChange.justification }}\" placeholder=\"Business reason for this purchase\" style=\"width:100%;box-sizing:border-box;background:#0c121c;border:1px solid rgba(255,255,255,0.1);border-radius:9px;padding:11px 13px;font-size:13px;color:#EAEEF5;font-family:inherit;outline:none\"><\u002Fdiv>\n                  <div>\n                    <label style=\"display:block;font-size:11px;font-weight:600;color:#8B94A6;margin-bottom:7px\">Invoice / quote<\u002Flabel>\n                    <label style=\"display:flex;align-items:center;gap:11px;background:#0c121c;border:1px dashed rgba(255,255,255,0.16);border-radius:9px;padding:13px 14px;cursor:pointer\" style-hover=\"border-color:rgba(0,204,255,0.4)\">\n                      <span style=\"width:34px;height:34px;border-radius:9px;background:rgba(0,204,255,0.12);display:flex;align-items:center;justify-content:center;flex-shrink:0\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#00CCFF\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#ic-upload\"><\u002Fuse><\u002Fsvg><\u002Fspan>\n                      <span style=\"flex:1;min-width:0\"><span style=\"display:block;font-size:12.5px;font-weight:500;color:#EAEEF5\">{{ poInvoiceLabel }}<\u002Fspan><span style=\"display:block;font-size:10.5px;color:#5C6678\">PDF, PNG or JPG · drag &amp; drop or click<\u002Fspan><\u002Fspan>\n                      <input type=\"file\" onchange=\"{{ poUpload }}\" style=\"display:none\">\n                    <\u002Flabel>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex;align-items:center;justify-content:flex-end;gap:10px;padding:18px 24px;border-top:1px solid rgba(255,255,255,0.07)\">\n                  <button onclick=\"{{ closePoModal }}\" style=\"font-size:12.5px;font-weight:500;color:#C2C9D6;background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:9px;padding:10px 16px;cursor:pointer;font-family:inherit\">Cancel<\u002Fbutton>\n                  <button onclick=\"{{ raisePo }}\" style=\"{{ raisePoBtnStyle }}\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#ic-send\"><\u002Fuse><\u002Fsvg>Submit for approval<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- ===== PO DETAIL · SIGN-OFF FLOW ===== -->\n          <sc-if value=\"{{ poDetailOpen }}\">\n            <div onclick=\"{{ poDetailView.onClose }}\" style=\"position:fixed;inset:0;background:rgba(4,8,14,0.66);backdrop-filter:blur(3px);z-index:121;display:flex;align-items:center;justify-content:center;animation:gxfade .2s ease;padding:24px\">\n              <div onclick=\"{{ stop }}\" style=\"width:780px;max-width:96vw;max-height:90vh;overflow-y:auto;background:#111824;border:1px solid rgba(255,255,255,0.1);border-radius:18px;box-shadow:0 30px 80px rgba(0,0,0,0.6)\" class=\"gxscroll\">\n                <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding:22px 26px;border-bottom:1px solid rgba(255,255,255,0.07)\">\n                  <div>\n                    <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:6px\"><span style=\"font-family:monospace;font-size:14px;font-weight:600;color:#00CCFF\">{{ poDetailView.number }}<\u002Fspan><span style=\"font-size:11px;font-weight:600;color:{{ poDetailView.statusColor }};background:{{ poDetailView.statusBg }};padding:3px 11px;border-radius:20px\">{{ poDetailView.statusLabel }}<\u002Fspan><\u002Fdiv>\n                    <h3 style=\"font-size:18px;font-weight:600;letter-spacing:-0.3px\">{{ poDetailView.description }}<\u002Fh3>\n                    <div style=\"font-size:12px;color:#8B94A6;margin-top:5px\">{{ poDetailView.supplier }} · raised by {{ poDetailView.raisedBy }} · {{ poDetailView.date }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <button onclick=\"{{ poDetailView.onClose }}\" style=\"width:32px;height:32px;border-radius:9px;border:1px solid rgba(255,255,255,0.08);background:transparent;color:#8B94A6;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0\" style-hover=\"background:rgba(255,255,255,0.06)\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><use href=\"#ic-x\"><\u002Fuse><\u002Fsvg><\u002Fbutton>\n                <\u002Fdiv>\n\n                <!-- the visible sign-off process -->\n                <div style=\"padding:30px 34px 26px\">\n                  <div style=\"font-size:10px;font-weight:600;letter-spacing:0.6px;color:#5C6678;text-transform:uppercase;margin-bottom:22px\">Approval &amp; sign-off process<\u002Fdiv>\n                  <div style=\"display:flex;align-items:flex-start\">\n                    <sc-for list=\"{{ poDetailView.steps }}\" as=\"s\" hint-placeholder-count=\"5\">\n                      <sc-if value=\"{{ s.notFirst }}\"><div style=\"{{ s.connStyle }}\"><\u002Fdiv><\u002Fsc-if>\n                      <div style=\"display:flex;flex-direction:column;align-items:center;width:108px;flex-shrink:0\">\n                        <div style=\"{{ s.circleStyle }}\">\n                          <sc-if value=\"{{ s.done }}\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#34D399\" stroke-width=\"2.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#ic-check\"><\u002Fuse><\u002Fsvg><\u002Fsc-if>\n                          <sc-if value=\"{{ s.current }}\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#00CCFF\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#ic-clock\"><\u002Fuse><\u002Fsvg><\u002Fsc-if>\n                          <sc-if value=\"{{ s.rejected }}\"><svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FB7185\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#ic-x\"><\u002Fuse><\u002Fsvg><\u002Fsc-if>\n                          <sc-if value=\"{{ s.pending }}\"><span style=\"font-size:13px;font-weight:600;color:#5C6678\">{{ s.idx }}<\u002Fspan><\u002Fsc-if>\n                        <\u002Fdiv>\n                        <div style=\"{{ s.labelStyle }}\">{{ s.label }}<\u002Fdiv>\n                        <div style=\"{{ s.nameStyle }}\">{{ s.by }}<\u002Fdiv>\n                        <div style=\"font-size:9.5px;color:#4A5366;margin-top:1px\">{{ s.date }}<\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:0 26px 22px\">\n                  <div style=\"background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.05);border-radius:12px;padding:16px 18px\">\n                    <div style=\"font-size:10.5px;color:#5C6678;margin-bottom:6px\">Order value<\u002Fdiv>\n                    <div style=\"font-size:22px;font-weight:600;letter-spacing:-0.5px\">{{ poDetailView.amountFmt }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.05);border-radius:12px;padding:16px 18px\">\n                    <div style=\"font-size:10.5px;color:#5C6678;margin-bottom:9px\">Invoice<\u002Fdiv>\n                    <div style=\"display:flex;align-items:center;gap:10px\">\n                      <span style=\"width:30px;height:30px;border-radius:8px;background:{{ poDetailView.invoiceBg }};display:flex;align-items:center;justify-content:center;flex-shrink:0\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"{{ poDetailView.invoiceColor }}\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#ic-paperclip\"><\u002Fuse><\u002Fsvg><\u002Fspan>\n                      <span style=\"font-size:12px;color:#C2C9D6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ poDetailView.invoiceName }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <sc-if value=\"{{ poDetailView.canAction }}\">\n                  <div style=\"display:flex;align-items:center;justify-content:flex-end;gap:10px;padding:18px 26px;border-top:1px solid rgba(255,255,255,0.07);background:rgba(0,204,255,0.03)\">\n                    <span style=\"font-size:11.5px;color:#8B94A6;margin-right:auto\">Action required at this stage<\u002Fspan>\n                    <sc-if value=\"{{ poDetailView.showReject }}\"><button onclick=\"{{ poDetailView.onReject }}\" style=\"font-size:12.5px;font-weight:600;color:#FB7185;background:rgba(251,113,133,0.1);border:1px solid rgba(251,113,133,0.3);border-radius:9px;padding:10px 16px;cursor:pointer;font-family:inherit\" style-hover=\"background:rgba(251,113,133,0.18)\">Reject<\u002Fbutton><\u002Fsc-if>\n                    <button onclick=\"{{ poDetailView.onAdvance }}\" style=\"font-size:12.5px;font-weight:600;color:#06121a;background:#34D399;border:none;border-radius:9px;padding:10px 18px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:7px\" style-hover=\"filter:brightness(1.08)\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#ic-check\"><\u002Fuse><\u002Fsvg>{{ poDetailView.actLabel }}<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- toast -->\n          <sc-if value=\"{{ poToast }}\">\n            <div style=\"position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:130;background:#0E1B16;border:1px solid rgba(52,211,153,0.4);color:#EAEEF5;font-size:12.5px;font-weight:500;padding:12px 18px;border-radius:11px;box-shadow:0 16px 40px rgba(0,0,0,0.5);display:flex;align-items:center;gap:10px;animation:gxfade .25s ease\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#34D399\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#ic-check\"><\u002Fuse><\u002Fsvg>{{ poToast }}<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ HR WORKFLOWS ============ -->\n      <sc-if value=\"{{ isHr }}\">\n        <div>\n          <div style=\"display:flex;gap:14px;margin-bottom:20px\">\n            <sc-for list=\"{{ hrStats }}\" as=\"st\" hint-placeholder-count=\"4\">\n              <div style=\"flex:1;background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:13px;padding:15px 17px\"><div style=\"font-size:11.5px;color:#8B94A6;margin-bottom:7px\">{{ st.label }}<\u002Fdiv><div style=\"font-size:21px;font-weight:600;letter-spacing:-0.5px;color:{{ st.color }}\">{{ st.value }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:14px\"><span style=\"font-size:12.5px;color:#8B94A6\">Joiners, movers &amp; leavers — onboarding and offboarding workflows with approval chains<\u002Fspan><button style=\"font-size:12px;font-weight:600;color:#06121a;background:#00CCFF;border:none;border-radius:9px;padding:8px 14px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:7px\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#ic-plus\"><\u002Fuse><\u002Fsvg>Start workflow<\u002Fbutton><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:16px\">\n            <sc-for list=\"{{ workflows }}\" as=\"w\" hint-placeholder-count=\"4\">\n              <div style=\"background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:15px;padding:18px 20px\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:14px\">\n                  <div style=\"display:flex;align-items:center;gap:11px\"><div style=\"width:38px;height:38px;border-radius:10px;background:{{ w.bg }};display:flex;align-items:center;justify-content:center\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"{{ w.color }}\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#ic-workflow\"><\u002Fuse><\u002Fsvg><\u002Fdiv><div><div style=\"font-size:13.5px;font-weight:600\">{{ w.employee }}<\u002Fdiv><div style=\"font-size:11px;color:#8B94A6\">{{ w.role }} · {{ w.date }}<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                  <span style=\"font-size:10px;font-weight:600;color:{{ w.color }};background:{{ w.bg }};padding:4px 10px;border-radius:20px\">{{ w.type }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:14px\"><div style=\"flex:1;height:6px;border-radius:4px;background:rgba(255,255,255,0.07);overflow:hidden\"><div style=\"height:100%;width:{{ w.progress }};background:{{ w.color }}\"><\u002Fdiv><\u002Fdiv><span style=\"font-size:11px;color:#8B94A6\">{{ w.progress }}<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:9px\">\n                  <sc-for list=\"{{ w.steps }}\" as=\"s\" hint-placeholder-count=\"5\">\n                    <div style=\"display:flex;align-items:center;gap:10px\">\n                      <sc-if value=\"{{ s.done }}\"><div style=\"width:18px;height:18px;border-radius:50%;background:rgba(52,211,153,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0\"><svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#34D399\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#ic-check\"><\u002Fuse><\u002Fsvg><\u002Fdiv><\u002Fsc-if>\n                      <sc-if value=\"{{ s.pending }}\"><div style=\"width:18px;height:18px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.18);flex-shrink:0\"><\u002Fdiv><\u002Fsc-if>\n                      <span style=\"{{ s.textStyle }}\">{{ s.label }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ REPORTS & EVIDENCE ============ -->\n      <sc-if value=\"{{ isReports }}\">\n        <div>\n          <h3 style=\"font-size:15px;font-weight:600;margin-bottom:14px\">Report builder<\u002Fh3>\n          <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px\">\n            <sc-for list=\"{{ reportTemplates }}\" as=\"r\" hint-placeholder-count=\"6\">\n              <div style=\"background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:18px 20px;cursor:pointer\" style-hover=\"border-color:rgba(0,204,255,0.35);background:#19212F\">\n                <div style=\"width:38px;height:38px;border-radius:10px;background:{{ r.color }}22;display:flex;align-items:center;justify-content:center;margin-bottom:14px\"><svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"{{ r.color }}\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#ic-{{ r.icon }}\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n                <div style=\"font-size:13.5px;font-weight:600;margin-bottom:5px\">{{ r.name }}<\u002Fdiv>\n                <div style=\"font-size:11.5px;color:#8B94A6;line-height:1.5\">{{ r.desc }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n            <div style=\"background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:15px;padding:20px 22px\">\n              <h3 style=\"font-size:14px;font-weight:600;margin-bottom:14px\">Scheduled reports<\u002Fh3>\n              <div style=\"display:flex;flex-direction:column;gap:11px\">\n                <sc-for list=\"{{ scheduledReports }}\" as=\"s\" hint-placeholder-count=\"3\">\n                  <div style=\"display:flex;align-items:center;gap:13px;padding:12px 14px;background:rgba(255,255,255,0.025);border-radius:11px\"><div style=\"width:32px;height:32px;border-radius:8px;background:rgba(0,204,255,0.12);display:flex;align-items:center;justify-content:center;flex-shrink:0\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#00CCFF\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#ic-clock\"><\u002Fuse><\u002Fsvg><\u002Fdiv><div style=\"flex:1\"><div style=\"font-size:12.5px;font-weight:500\">{{ s.name }}<\u002Fdiv><div style=\"font-size:10.5px;color:#5C6678;margin-top:1px\">{{ s.freq }} · next {{ s.next }}<\u002Fdiv><\u002Fdiv><span style=\"font-size:10.5px;color:#8B94A6\">{{ s.recipients }}<\u002Fspan><\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:15px;padding:20px 22px\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:14px\"><h3 style=\"font-size:14px;font-weight:600\">Evidence exports<\u002Fh3><span style=\"font-size:11px;color:#00CCFF;cursor:pointer\">+ New pack<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:11px\">\n                <sc-for list=\"{{ evidencePacks }}\" as=\"e\" hint-placeholder-count=\"3\">\n                  <div style=\"display:flex;align-items:center;gap:13px;padding:12px 14px;background:rgba(255,255,255,0.025);border-radius:11px\"><div style=\"width:32px;height:32px;border-radius:8px;background:rgba(52,211,153,0.12);display:flex;align-items:center;justify-content:center;flex-shrink:0\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#34D399\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#ic-doc\"><\u002Fuse><\u002Fsvg><\u002Fdiv><div style=\"flex:1\"><div style=\"font-size:12.5px;font-weight:500\">{{ e.name }}<\u002Fdiv><div style=\"font-size:10.5px;color:#5C6678;margin-top:1px\">{{ e.controls }} · {{ e.files }} · {{ e.date }}<\u002Fdiv><\u002Fdiv><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#8B94A6\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"cursor:pointer\"><use href=\"#ic-download\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ ORGANISATION ============ -->\n      <sc-if value=\"{{ isOrg }}\">\n        <div style=\"animation:gxfade .3s ease\">\n          <div style=\"display:flex;gap:14px;margin-bottom:20px\">\n            <sc-for list=\"{{ orgStats }}\" as=\"st\" hint-placeholder-count=\"4\">\n              <div style=\"flex:1;background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:13px;padding:15px 17px\"><div style=\"font-size:11.5px;color:#8B94A6;margin-bottom:7px\">{{ st.label }}<\u002Fdiv><div style=\"font-size:21px;font-weight:600;letter-spacing:-0.5px;color:{{ st.color }}\">{{ st.value }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px\">\n            <div style=\"display:flex;gap:8px\"><sc-for list=\"{{ orgViewTabs }}\" as=\"t\" hint-placeholder-count=\"2\"><button onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\">{{ t.label }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv>\n            <sc-if value=\"{{ orgDirectory }}\">\n              <div style=\"display:flex;align-items:center;gap:9px;background:#141B27;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:8px 13px;width:300px\">\n                <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#5C6678\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0\"><use href=\"#ic-search\"><\u002Fuse><\u002Fsvg>\n                <input value=\"{{ orgQuery }}\" oninput=\"{{ setOrgQuery }}\" placeholder=\"Search name, role, dept, number…\" style=\"flex:1;background:transparent;border:none;outline:none;color:#EAEEF5;font-size:12.5px;font-family:inherit;min-width:0\">\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <!-- DIRECTORY -->\n          <sc-if value=\"{{ orgDirectory }}\">\n            <div style=\"font-size:11px;color:#5C6678;margin-bottom:12px\">{{ directoryCount }} people · click anyone to open their profile<\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:13px\">\n              <sc-for list=\"{{ directory }}\" as=\"e\" hint-placeholder-count=\"9\">\n                <div onclick=\"{{ e.onOpen }}\" style=\"background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:13px;padding:16px 17px;cursor:pointer;display:flex;align-items:center;gap:13px\" style-hover=\"border-color:rgba(0,204,255,0.35);background:#19212F\">\n                  <div style=\"width:44px;height:44px;border-radius:12px;background:{{ e.color }};display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;color:#06121a;flex-shrink:0\">{{ e.initials }}<\u002Fdiv>\n                  <div style=\"min-width:0;flex:1\">\n                    <div style=\"display:flex;align-items:center;gap:7px\"><span style=\"font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ e.name }}<\u002Fspan><sc-if value=\"{{ e.isFlagged }}\"><span style=\"font-size:8.5px;font-weight:600;color:#FBBF24;background:rgba(251,191,36,0.14);border-radius:4px;padding:1px 5px;white-space:nowrap\">{{ e.statusLabel }}<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n                    <div style=\"font-size:11px;color:#8B94A6;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ e.role }}<\u002Fdiv>\n                    <div style=\"display:flex;align-items:center;gap:7px;margin-top:7px\"><span style=\"width:7px;height:7px;border-radius:2px;background:{{ e.deptColor }}\"><\u002Fspan><span style=\"font-size:10px;color:#5C6678\">{{ e.dept }} · {{ e.location }}<\u002Fspan><\u002Fdiv>\n                  <\u002Fdiv>\n                  <span style=\"font-size:9.5px;font-family:monospace;color:#4A5366;flex-shrink:0;align-self:flex-start\">{{ e.empNo }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- ORG CHART (reporting relationships) -->\n          <sc-if value=\"{{ orgChart }}\">\n            <div style=\"background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:15px;padding:26px 22px;overflow-x:auto\" class=\"gxscroll\">\n              <div style=\"display:flex;flex-direction:column;align-items:center;min-width:760px\">\n                <button onclick=\"{{ chartCeo.onOpen }}\" style=\"background:rgba(0,204,255,0.08);border:1px solid rgba(0,204,255,0.3);border-radius:12px;padding:13px 22px;display:flex;align-items:center;gap:12px;cursor:pointer;font-family:inherit\" style-hover=\"background:rgba(0,204,255,0.14)\">\n                  <div style=\"width:40px;height:40px;border-radius:11px;background:{{ chartCeo.color }};display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#06121a\">{{ chartCeo.initials }}<\u002Fdiv>\n                  <div style=\"text-align:left\"><div style=\"font-size:13.5px;font-weight:600;color:#EAEEF5\">{{ chartCeo.name }}<\u002Fdiv><div style=\"font-size:11px;color:#8B94A6\">{{ chartCeo.role }}<\u002Fdiv><\u002Fdiv>\n                <\u002Fbutton>\n                <div style=\"width:2px;height:26px;background:rgba(255,255,255,0.12)\"><\u002Fdiv>\n                <div style=\"height:2px;background:rgba(255,255,255,0.12);width:86%;margin-bottom:0\"><\u002Fdiv>\n                <div style=\"display:grid;grid-template-columns:repeat({{ managerCols }},1fr);gap:18px;width:100%;align-items:start\">\n                  <sc-for list=\"{{ chartManagers }}\" as=\"m\" hint-placeholder-count=\"5\">\n                    <div style=\"display:flex;flex-direction:column;align-items:center\">\n                      <div style=\"width:2px;height:18px;background:rgba(255,255,255,0.12)\"><\u002Fdiv>\n                      <button onclick=\"{{ m.onOpen }}\" style=\"width:100%;background:#141B27;border:1px solid rgba(255,255,255,0.08);border-top:2px solid {{ m.deptColor }};border-radius:11px;padding:12px 12px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;font-family:inherit\" style-hover=\"border-color:rgba(0,204,255,0.4)\">\n                        <div style=\"width:34px;height:34px;border-radius:9px;background:{{ m.color }};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#06121a\">{{ m.initials }}<\u002Fdiv>\n                        <div style=\"text-align:center\"><div style=\"font-size:12px;font-weight:600;color:#EAEEF5\">{{ m.name }}<\u002Fdiv><div style=\"font-size:10px;color:#8B94A6;margin-top:1px\">{{ m.role }}<\u002Fdiv><\u002Fdiv>\n                        <span style=\"font-size:9.5px;color:#5C6678;background:rgba(255,255,255,0.05);padding:2px 8px;border-radius:20px\">{{ m.count }} reports<\u002Fspan>\n                      <\u002Fbutton>\n                      <div style=\"display:flex;flex-direction:column;gap:6px;width:100%;margin-top:10px\">\n                        <sc-for list=\"{{ m.reports }}\" as=\"r\" hint-placeholder-count=\"3\">\n                          <button onclick=\"{{ r.onOpen }}\" style=\"display:flex;align-items:center;gap:9px;background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.05);border-radius:9px;padding:7px 9px;cursor:pointer;font-family:inherit;text-align:left\" style-hover=\"background:rgba(255,255,255,0.06)\">\n                            <div style=\"width:24px;height:24px;border-radius:7px;background:{{ r.color }};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#06121a;flex-shrink:0\">{{ r.initials }}<\u002Fdiv>\n                            <div style=\"min-width:0\"><div style=\"font-size:11px;font-weight:500;color:#C2C9D6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ r.name }}<\u002Fdiv><div style=\"font-size:9px;color:#5C6678;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ r.role }}<\u002Fdiv><\u002Fdiv>\n                          <\u002Fbutton>\n                        <\u002Fsc-for>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- ===== EMPLOYEE PROFILE ===== -->\n          <sc-if value=\"{{ profileOpen }}\">\n            <div onclick=\"{{ profile.onClose }}\" style=\"position:fixed;inset:0;background:rgba(4,8,14,0.66);backdrop-filter:blur(3px);z-index:121;display:flex;align-items:center;justify-content:center;animation:gxfade .2s ease;padding:24px\">\n              <div onclick=\"{{ stop }}\" style=\"width:720px;max-width:96vw;max-height:90vh;overflow-y:auto;background:#111824;border:1px solid rgba(255,255,255,0.1);border-radius:18px;box-shadow:0 30px 80px rgba(0,0,0,0.6)\" class=\"gxscroll\">\n                <div style=\"position:relative;padding:26px 28px 22px;border-bottom:1px solid rgba(255,255,255,0.07);background:linear-gradient(160deg,rgba(0,204,255,0.07),transparent 70%)\">\n                  <button onclick=\"{{ profile.onClose }}\" style=\"position:absolute;top:18px;right:18px;width:32px;height:32px;border-radius:9px;border:1px solid rgba(255,255,255,0.08);background:transparent;color:#8B94A6;cursor:pointer;display:flex;align-items:center;justify-content:center\" style-hover=\"background:rgba(255,255,255,0.06)\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><use href=\"#ic-x\"><\u002Fuse><\u002Fsvg><\u002Fbutton>\n                  <div style=\"display:flex;align-items:center;gap:18px\">\n                    <div style=\"width:72px;height:72px;border-radius:18px;background:{{ profile.color }};display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:600;color:#06121a;flex-shrink:0\">{{ profile.initials }}<\u002Fdiv>\n                    <div>\n                      <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:4px\"><h3 style=\"font-size:22px;font-weight:600;letter-spacing:-0.4px\">{{ profile.name }}<\u002Fh3><sc-if value=\"{{ profile.isFlagged }}\"><span style=\"font-size:10px;font-weight:600;color:#FBBF24;background:rgba(251,191,36,0.14);border-radius:6px;padding:2px 9px\">{{ profile.statusLabel }}<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n                      <div style=\"font-size:13.5px;color:#C2C9D6\">{{ profile.role }}<\u002Fdiv>\n                      <div style=\"display:flex;align-items:center;gap:8px;margin-top:8px\"><span style=\"width:9px;height:9px;border-radius:3px;background:{{ profile.deptColor }}\"><\u002Fspan><span style=\"font-size:11.5px;color:#8B94A6\">{{ profile.dept }} · {{ profile.location }} · {{ profile.years }}<\u002Fspan><\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <sc-if value=\"{{ profile.hasSocials }}\">\n                    <div style=\"display:flex;gap:9px;margin-top:18px\">\n                      <sc-for list=\"{{ profile.socials }}\" as=\"soc\" hint-placeholder-count=\"2\">\n                        <div style=\"display:flex;align-items:center;gap:7px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:9px;padding:6px 11px\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"{{ soc.color }}\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#ic-{{ soc.icon }}\"><\u002Fuse><\u002Fsvg><span style=\"font-size:11px;color:#C2C9D6\">{{ soc.label }}<\u002Fspan><\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n\n                <div style=\"display:grid;grid-template-columns:1.3fr 1fr;gap:18px;padding:24px 28px\">\n                  <div>\n                    <div style=\"font-size:10px;font-weight:600;letter-spacing:0.6px;color:#5C6678;text-transform:uppercase;margin-bottom:13px\">Employee details<\u002Fdiv>\n                    <div style=\"display:flex;flex-direction:column;gap:2px\">\n                      <sc-for list=\"{{ profile.facts }}\" as=\"f\" hint-placeholder-count=\"8\">\n                        <div style=\"display:flex;align-items:center;gap:12px;padding:9px 2px;border-bottom:1px solid rgba(255,255,255,0.04)\">\n                          <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#5C6678\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0\"><use href=\"#ic-{{ f.icon }}\"><\u002Fuse><\u002Fsvg>\n                          <span style=\"font-size:11px;color:#5C6678;width:120px;flex-shrink:0\">{{ f.label }}<\u002Fspan>\n                          <span style=\"font-size:12.5px;color:#EAEEF5;font-weight:450\">{{ f.value }}<\u002Fspan>\n                        <\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div>\n                    <div style=\"font-size:10px;font-weight:600;letter-spacing:0.6px;color:#5C6678;text-transform:uppercase;margin-bottom:13px\">Reporting line<\u002Fdiv>\n                    <sc-if value=\"{{ profile.hasManager }}\">\n                      <div style=\"font-size:10px;color:#5C6678;margin-bottom:6px\">Reports to<\u002Fdiv>\n                      <button onclick=\"{{ profile.manager.onOpen }}\" style=\"width:100%;display:flex;align-items:center;gap:11px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:11px;padding:11px 13px;cursor:pointer;font-family:inherit;text-align:left;margin-bottom:18px\" style-hover=\"border-color:rgba(0,204,255,0.4)\">\n                        <div style=\"width:34px;height:34px;border-radius:9px;background:{{ profile.manager.color }};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#06121a;flex-shrink:0\">{{ profile.manager.initials }}<\u002Fdiv>\n                        <div style=\"min-width:0\"><div style=\"font-size:12.5px;font-weight:600;color:#EAEEF5\">{{ profile.manager.name }}<\u002Fdiv><div style=\"font-size:10.5px;color:#8B94A6\">{{ profile.manager.role }}<\u002Fdiv><\u002Fdiv>\n                      <\u002Fbutton>\n                    <\u002Fsc-if>\n                    <div style=\"font-size:10px;color:#5C6678;margin-bottom:6px\">Direct reports · {{ profile.reportCount }}<\u002Fdiv>\n                    <sc-if value=\"{{ profile.hasReports }}\">\n                      <div style=\"display:flex;flex-direction:column;gap:7px\">\n                        <sc-for list=\"{{ profile.reports }}\" as=\"r\" hint-placeholder-count=\"3\">\n                          <button onclick=\"{{ r.onOpen }}\" style=\"width:100%;display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.05);border-radius:10px;padding:8px 11px;cursor:pointer;font-family:inherit;text-align:left\" style-hover=\"background:rgba(255,255,255,0.06)\">\n                            <div style=\"width:28px;height:28px;border-radius:8px;background:{{ r.color }};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#06121a;flex-shrink:0\">{{ r.initials }}<\u002Fdiv>\n                            <div style=\"min-width:0\"><div style=\"font-size:11.5px;font-weight:500;color:#C2C9D6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ r.name }}<\u002Fdiv><div style=\"font-size:9.5px;color:#5C6678;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ r.role }}<\u002Fdiv><\u002Fdiv>\n                          <\u002Fbutton>\n                        <\u002Fsc-for>\n                      <\u002Fdiv>\n                    <\u002Fsc-if>\n                    <sc-if value=\"{{ profile.noReports }}\"><div style=\"font-size:11.5px;color:#5C6678;padding:4px 2px\">No direct reports.<\u002Fdiv><\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ TENANTS (SUPER ADMIN) ============ -->\n      <sc-if value=\"{{ isTenants }}\">\n        <div>\n          <div style=\"display:flex;gap:14px;margin-bottom:20px\">\n            <sc-for list=\"{{ tenantStats }}\" as=\"st\" hint-placeholder-count=\"4\">\n              <div style=\"flex:1;background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:13px;padding:15px 17px\"><div style=\"font-size:11.5px;color:#8B94A6;margin-bottom:7px\">{{ st.label }}<\u002Fdiv><div style=\"font-size:21px;font-weight:600;letter-spacing:-0.5px;color:{{ st.color }}\">{{ st.value }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div
