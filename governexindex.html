  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ding:13px 4px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12.5px\" style-hover=\"background:rgba(255,255,255,0.02)\">\n                <div style=\"display:flex;align-items:center;gap:10px\"><div style=\"width:28px;height:28px;border-radius:8px;background:rgba(0,204,255,0.1);display:flex;align-items:center;justify-content:center\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#00CCFF\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#ic-shield\"><\u002Fuse><\u002Fsvg><\u002Fdiv><span style=\"font-weight:500\">{{ p.name }}<\u002Fspan><\u002Fdiv>\n                <span style=\"color:#8B94A6\">{{ p.version }}<\u002Fspan>\n                <span style=\"color:#C2C9D6\">{{ p.owner }}<\u002Fspan>\n                <span style=\"color:#8B94A6;font-size:11px\">{{ p.clause }}<\u002Fspan>\n                <span style=\"color:#8B94A6\">{{ p.review }}<\u002Fspan>\n                <div style=\"display:flex;align-items:center;gap:8px\"><div style=\"flex:1;max-width:54px;height:5px;border-radius:4px;background:rgba(255,255,255,0.08);overflow:hidden\"><div style=\"height:100%;width:{{ p.ack }};background:#00CCFF\"><\u002Fdiv><\u002Fdiv><span style=\"font-size:11px;color:#C2C9D6\">{{ p.ack }}<\u002Fspan><\u002Fdiv>\n                <span style=\"font-size:11px;font-weight:600;color:{{ p.sColor }};background:{{ p.sBg }};padding:3px 9px;border-radius:20px;text-align:center;justify-self:start\">{{ p.status }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ PROJECTS (GANTT) ============ -->\n      <sc-if value=\"{{ isProjects }}\">\n        <div style=\"animation:gxfade .3s ease\">\n          <!-- view tabs + new project -->\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:20px\">\n            <div style=\"display:flex;gap:8px\">\n le=\"font-size:11.5px;color:#5C6678;margin-bottom:14px\">Every project report rolls up here · click a row to open its status report<\u002Fp>\n                  <div style=\"display:grid;grid-template-columns:2.4fr 1.3fr 1.2fr 0.9fr 0.9fr 0.7fr 0.7fr;gap:10px;padding:0 14px 10px;font-size:10px;font-weight:600;letter-spacing:0.5px;color:#5C6678;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,0.06)\">\n                    <span>Project<\u002Fspan><span>Owner<\u002Fspan><span>Forecast end<\u002Fspan><span>Status<\u002Fspan><span>Burn<\u002Fspan><span>Risks<\u002Fspan><span>Deps<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;gap:8px;margin-top:10px\">\n                    <sc-for list=\"{{ projectRows }}\" as=\"r\" hint-placeholder-count=\"6\">\n                      <div onclick=\"{{ r.onClick }}\" style=\"{{ r.rowStyle }}\" style-hover=\"border-color:rgba(0,204,255,0.35);background:rgba(0,204,255,0.04)\">\n                        <div style=\"min-width:0\"><div style=\"font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ r.name }}<\u002Fdiv><div style=\"font-size:10px;color:#5C6678;margin-top:2px\">{{ r.stage }}<\u002Fdiv><\u002Fdiv>\n                        <div style=\"display:flex;align-items:center;gap:8px;min-width:0\"><div style=\"width:24px;height:24px;border-radius:7px;background:{{ r.pmColor }};display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:600;color:#06121a;flex-shrink:0\">{{ r.pmInitials }}<\u002Fdiv><span style=\"font-size:11.5px;color:#C2C9D6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ r.pm }}<\u002Fspan><\u002Fdiv>\n                        <span style=\"font-size:11.5px;color:#C2C9D6\">{{ r.forecastEnd }}<\u002Fspan>\n                        <span style=\"justify-self:start;font-size:10px;font-weight:600;color:{{ r.sColor }};background:{{ r.sBg }};padding:3px 9px;border-radius:20px;white-space:nowrap\">{{ r.status }}<\u002Fspan>\n                        <span style=\"font-size:12px;font-weight:600;color:{{ r.burnColor }}\">{{ r.burn }}<\u002Fspan>\n                        <span style=\"font-size:12px;color:#C2C9D6\">{{ r.risks }}<\u002Fspan>\n                        <span style=\"font-size:12px;color:#C2C9D6\">{{ r.deps }}<\u002Fspan>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <!-- RAG donut -->\n                <div style=\"background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:15px;padding:20px 22px;display:flex;flex-direction:column\">\n                  <h3 style=\"font-size:15px;font-weight:600;margin-bottom:2px\">Delivery confidence<\u002Fh3>\n                  <p style=\"font-size:11.5px;color:#5C6678;margin-bottom:18px\">RAG across the portfolio<\u002Fp>\n                  <div style=\"display:flex;align-items:center;justify-content:center;margin-bottom:18px\">\n                    <div style=\"width:140px;height:140px;border-radius:50%;background:{{ ragDonut }};display:flex;align-items:center;justify-content:center\">\n                      <div style=\"width:96px;height:96px;border-radius:50%;background:#121925;display:flex;flex-direction:column;align-items:center;justify-content:center\">\n                        <span style=\"font-size:26px;font-weight:600;color:#34D399;line-height:1\">{{ donutOnTrack }}<\u002Fspan>\n                        <span style=\"font-size:10px;color:#5C6678\">on track<\u002Fspan>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;gap:9px\">\n                    <sc-for list=\"{{ ragLegend }}\" as=\"l\" hint-placeholder-count=\"3\">\n                      <div style=\"display:flex;align-items:center;justify-content:space-between\"><span style=\"display:flex;align-items:center;gap:8px;font-size:12px;color:#C2C9D6\"><span style=\"width:10px;height:10px;border-radius:3px;background:{{ l.color }}\"><\u002Fspan>{{ l.label }}<\u002Fspan><span style=\"font-size:12px;font-weight:600;color:{{ l.color }}\">{{ l.value }}<\u002Fspan><\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n                <!-- dependency alerts -->\n                <div style=\"background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:15px;padding:20px 22px\">\n                  <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:14px\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FBBF24\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#ic-alert\"><\u002Fuse><\u002Fsvg><h3 style=\"font-size:15px;font-weight:600\">Cross-project dependency alerts<\u002Fh3><\u002Fdiv>\n                  <sc-if value=\"{{ hasAlerts }}\">\n                    <div style=\"display:flex;flex-direction:column;gap:9px\">\n                      <sc-for list=\"{{ depAlerts }}\" as=\"a\" hint-placeholder-count=\"2\">\n                        <div onclick=\"{{ a.onClick }}\" style=\"cursor:pointer;background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.05);border-left:3px solid {{ a.color }};border-radius:10px;padding:12px 14px\" style-hover=\"background:rgba(255,255,255,0.045)\">\n                          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px\"><span style=\"font-size:12.5px;font-weight:500\">{{ a.proj }}<\u002Fspan><span style=\"font-size:9.5px;font-weight:600;color:{{ a.color }};background:{{ a.bg }};padding:2px 8px;border-radius:20px\">{{ a.status }}<\u002Fspan><\u002Fdiv>\n                          <div style=\"font-size:11px;color:#8B94A6\">{{ a.item }} — needs {{ a.dependsOn }}<\u002Fdiv>\n                        <\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ noAlerts }}\"><div style=\"display:flex;align-items:center;gap:9px;padding:14px 4px;font-size:12px;color:#5C6678\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#34D399\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#ic-check\"><\u002Fuse><\u002Fsvg>No blocked cross-project dependencies.<\u002Fdiv><\u002Fsc-if>\n                <\u002Fdiv>\n\n                <!-- at-risk milestones -->\n                <div style=\"background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:15px;padding:20px 22px\">\n                  <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:14px\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#00CCFF\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#ic-gantt\"><\u002Fuse><\u002Fsvg><h3 style=\"font-size:15px;font-weight:600\">Milestones to watch<\u002Fh3><\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;gap:9px\">\n                    <sc-for list=\"{{ watchMilestones }}\" as=\"m\" hint-placeholder-count=\"3\">\n                      <div style=\"background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.05);border-radius:10px;padding:12px 14px\">\n                        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px\"><span style=\"font-size:12.5px;font-weight:500\"><span style=\"display:inline-block;width:8px;height:8px;border-radius:50%;background:{{ m.color }};margin-right:7px\"><\u002Fspan>{{ m.name }}<\u002Fspan><span style=\"font-size:11px;color:#8B94A6\">{{ m.forecast }}<\u002Fspan><\u002Fdiv>\n                        <div style=\"font-size:11px;color:#5C6678\">{{ m.proj }} · {{ m.activity }}<\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- ====== STATUS REPORT ====== -->\n          <sc-if value=\"{{ projReport }}\">\n            <div style=\"display:grid;grid-template-columns:236px 1fr;gap:16px\">\n              <!-- project selector rail -->\n              <div style=\"background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:15px;padding:14px 13px;align-self:start\">\n                <div style=\"font-size:10px;font-weight:600;letter-spacing:1px;color:#4A5366;text-transform:uppercase;padding:2px 8px 10px\">Projects<\u002Fdiv>\n                <sc-for list=\"{{ selectorList }}\" as=\"p\" hint-placeholder-count=\"6\">\n                  <button onclick=\"{{ p.onClick }}\" style=\"{{ p.style }}\">\n                    <div style=\"display:flex;align-items:center;gap:9px\"><span style=\"width:8px;height:8px;border-radius:50%;background:{{ p.color }};flex-shrink:0\"><\u002Fspan><div style=\"min-width:0\"><div style=\"font-size:12.5px;font-weight:500;color:#EAEEF5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ p.name }}<\u002Fdiv><div style=\"font-size:9.5px;color:#5C6678;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ p.code }}<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                  <\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n\n              <!-- the report -->\n              <div style=\"display:flex;flex-direction:column;gap:16px\">\n                <!-- title bar -->\n                <div style=\"background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:15px;padding:20px 22px\">\n                  <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px\">\n                    <div>\n                      <div style=\"font-size:11px;color:#5C6678;margin-bottom:4px\">{{ sel.programme }}<\u002Fdiv>\n                      <h2 style=\"font-size:23px;font-weight:600;letter-spacing:-0.5px;line-height:1.1\">{{ sel.name }}<\u002Fh2>\n                      <div style=\"font-size:12px;color:#8B94A6;margin-top:5px\">{{ sel.code }}<\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"display:flex;gap:9px;flex-shrink:0\">\n                      <button style=\"display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:500;color:#C2C9D6;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:8px 12px;cursor:pointer;font-family:inherit\" style-hover=\"background:rgba(255,255,255,0.08)\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#ic-download\"><\u002Fuse><\u002Fsvg>Export PDF<\u002Fbutton>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <!-- header key facts + baseline strip -->\n                  <div style=\"display:grid;grid-template-columns:1fr 1.25fr;gap:16px\">\n                    <div style=\"border:1px solid rgba(255,255,255,0.07);border-radius:11px;overflow:hidden\">\n                      <div style=\"display:flex;border-bottom:1px solid rgba(255,255,255,0.06)\"><div style=\"width:128px;padding:11px 13px;font-size:11.5px;font-weight:600;color:#8B94A6;background:rgba(255,255,255,0.025)\">Project Code<\u002Fdiv><div style=\"flex:1;padding:11px 13px;font-size:12px;color:#EAEEF5;display:flex;align-items:center;gap:9px\"><span style=\"font-family:monospace;font-weight:600;color:#00CCFF;letter-spacing:0.5px\">{{ sel.code }}<\u002Fspan><span style=\"font-size:10.5px;color:#5C6678\">{{ selRef }}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                      <div style=\"display:flex;border-bottom:1px solid rgba(255,255,255,0.06)\"><div style=\"width:128px;padding:11px 13px;font-size:11.5px;font-weight:600;color:#8B94A6;background:rgba(255,255,255,0.025)\">Methodology<\u002Fdiv><div style=\"flex:1;padding:11px 13px;font-size:12px;color:#EAEEF5;display:flex;align-items:center;gap:7px\">{{ selMethodology }}<span style=\"font-size:9px;font-weight:600;color:#A78BFA;background:rgba(167,139,250,0.14);border-radius:5px;padding:1px 6px\">FIXED<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                      <div style=\"display:flex;border-bottom:1px solid rgba(255,255,255,0.06)\"><div style=\"width:128px;padding:11px 13px;font-size:11.5px;font-weight:600;color:#8B94A6;background:rgba(255,255,255,0.025)\">Project Manager<\u002Fdiv><div style=\"flex:1;padding:11px 13px;font-size:12px;color:#EAEEF5;display:flex;align-items:center;gap:8px\"><span style=\"width:22px;height:22px;border-radius:6px;background:{{ sel.pmColor }};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#06121a\">{{ sel.pmInitials }}<\u002Fspan>{{ sel.pm }}<\u002Fdiv><\u002Fdiv>\n                      <div style=\"display:flex;border-bottom:1px solid rgba(255,255,255,0.06)\"><div style=\"width:128px;padding:11px 13px;font-size:11.5px;font-weight:600;color:#8B94A6;background:rgba(255,255,255,0.025)\">Current Status<\u002Fdiv><div style=\"flex:1;padding:11px 13px\"><span style=\"font-size:11px;font-weight:600;color:{{ selStatusColor }};background:{{ selStatusBg }};padding:3px 11px;border-radius:20px\">{{ sel.status }}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                      <div style=\"display:flex;border-bottom:1px solid rgba(255,255,255,0.06)\"><div style=\"width:128px;padding:11px 13px;font-size:11.5px;font-weight:600;color:#8B94A6;background:rgba(255,255,255,0.025)\">Previous Period<\u002Fdiv><div style=\"flex:1;padding:11px 13px\"><span style=\"font-size:11px;font-weight:600;color:{{ selPrevColor }};background:{{ selPrevBg }};padding:3px 11px;border-radius:20px\">{{ sel.previous }}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                      <div style=\"display:flex\"><div style=\"width:128px;padding:11px 13px;font-size:11.5px;font-weight:600;color:#8B94A6;background:rgba(255,255,255,0.025)\">Size<\u002Fdiv><div style=\"flex:1;padding:11px 13px;font-size:12px;color:#EAEEF5\">{{ sel.size }}<\u002Fdiv><\u002Fdiv>\n                    <\u002Fdiv>\n                    <div>\n                      <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:10px\">\n                        <div style=\"background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.05);border-radius:11px;padding:13px 15px\"><div style=\"font-size:10.5px;color:#5C6678;margin-bottom:6px\">Current Stage<\u002Fdiv><div style=\"font-size:14px;font-weight:600;color:#00CCFF\">{{ sel.stage }}<\u002Fdiv><\u002Fdiv>\n                        <div style=\"background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.05);border-radius:11px;padding:13px 15px\"><div style=\"font-size:10.5px;color:#5C6678;margin-bottom:6px\">Original Baseline End<\u002Fdiv><div style=\"font-size:14px;font-weight:600;color:#C2C9D6\">{{ sel.origEnd }}<\u002Fdiv><\u002Fdiv>\n                        <div style=\"background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.05);border-radius:11px;padding:13px 15px\"><div style=\"font-size:10.5px;color:#5C6678;margin-bottom:6px\">Current Baseline End<\u002Fdiv><div style=\"font-size:14px;font-weight:600;color:#C2C9D6\">{{ sel.currEnd }}<\u002Fdiv><\u002Fdiv>\n                        <div style=\"background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.05);border-radius:11px;padding:13px 15px\"><div style=\"font-size:10.5px;color:#5C6678;margin-bottom:6px\">Forecast End<\u002Fdiv><div style=\"font-size:14px;font-weight:600;color:#EAEEF5\">{{ sel.forecastEnd }}<\u002Fdiv><\u002Fdiv>\n                      <\u002Fdiv>\n                      <div style=\"display:flex;gap:10px\">\n                        <div style=\"flex:1;background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.05);border-radius:11px;padding:11px 15px\"><div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:7px\"><span style=\"font-size:10.5px;color:#5C6678\">Progress<\u002Fspan><span style=\"font-size:11.5px;font-weight:600;color:#00CCFF\">{{ selProgress }}<\u002Fspan><\u002Fdiv><div style=\"height:5px;border-radius:4px;background:rgba(255,255,255,0.07);overflow:hidden\"><div style=\"height:100%;width:{{ selProgress }};background:#00CCFF\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                        <div style=\"flex:1;background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.05);border-radius:11px;padding:11px 15px\"><div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:7px\"><span style=\"font-size:10.5px;color:#5C6678\">Budget burn<\u002Fspan><span style=\"font-size:11.5px;font-weight:600;color:{{ selBurnColor }}\">{{ selBurn }}<\u002Fspan><\u002Fdiv><div style=\"height:5px;border-radius:4px;background:rgba(255,255,255,0.07);overflow:hidden\"><div style=\"height:100%;width:{{ selBurn }};background:{{ selBurnColor }}\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <!-- methodology stage gate stepper -->\n                  <div style=\"margin-top:16px;border-top:1px solid rgba(255,255,255,0.06);padding-top:16px\">\n                    <div style=\"font-size:10px;font-weight:600;letter-spacing:0.6px;color:#5C6678;text-transform:uppercase;margin-bottom:14px\">{{ selMethodology }} · stage gates<\u002Fdiv>\n                    <div style=\"display:flex;align-items:flex-start;padding:0 6px\">\n                      <sc-for list=\"{{ stageSteps }}\" as=\"st\" hint-placeholder-count=\"4\">\n                        <sc-if value=\"{{ st.isFirst }}\"><div style=\"display:flex;flex-direction:column;align-items:center;flex-shrink:0\"><div style=\"{{ st.dotStyle }}\"><\u002Fdiv><div style=\"{{ st.labelStyle }}\">{{ st.name }}<\u002Fdiv><\u002Fdiv><\u002Fsc-if>\n                        <sc-if value=\"{{ st.notFirst }}\"><div style=\"{{ st.lineStyle }}\"><\u002Fdiv><div style=\"display:flex;flex-direction:column;align-items:center;flex-shrink:0\"><div style=\"{{ st.dotStyle }}\"><\u002Fdiv><div style=\"{{ st.labelStyle }}\">{{ st.name }}<\u002Fdiv><\u002Fdiv><\u002Fsc-if>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <!-- status summary -->\n                <div style=\"background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:15px;padding:20px 22px\">\n                  <h3 style=\"font-size:15px;font-weight:600;margin-bottom:12px\">Status Summary<\u002Fh3>\n                  <div style=\"display:flex;flex-direction:column;gap:11px\">\n                    <sc-for list=\"{{ sel.summary }}\" as=\"para\" hint-placeholder-count=\"3\">\n                      <p style=\"font-size:12.5px;line-height:1.65;color:#C2C9D6;text-wrap:pretty\">{{ para }}<\u002Fp>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <!-- milestones RAG -->\n                <div style=\"background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:15px;padding:20px 22px\">\n                  <h3 style=\"font-size:15px;font-weight:600;margin-bottom:14px\">Milestones<\u002Fh3>\n                  <div style=\"display:grid;grid-template-columns:1.8fr 0.7fr 1fr 1fr 2.1fr;gap:10px;padding:0 12px 10px;font-size:10px;font-weight:600;letter-spacing:0.5px;color:#5C6678;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,0.06)\">\n                    <span>Milestone<\u002Fspan><span>RAG<\u002Fspan><span>Current Baseline<\u002Fspan><span>Forecast<\u002Fspan><span>Activity Summary<\u002Fspan>\n                  <\u002Fdiv>\n                  <sc-for list=\"{{ milestoneGroups }}\" as=\"grp\" hint-placeholder-count=\"1\">\n                    <div style=\"padding:11px 12px 8px;font-size:11.5px;font-weight:600;color:#00CCFF;letter-spacing:0.2px\">{{ grp.name }}<\u002Fdiv>\n                    <sc-for list=\"{{ grp.rows }}\" as=\"m\" hint-placeholder-count=\"6\">\n                      <div style=\"display:grid;grid-template-columns:1.8fr 0.7fr 1fr 1fr 2.1fr;gap:10px;align-items:center;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.04)\">\n                        <span style=\"font-size:12px;color:#EAEEF5\">{{ m.name }}<\u002Fspan>\n                        <span style=\"justify-self:start;font-size:9.5px;font-weight:700;color:{{ m.ragColor }};background:{{ m.ragBg }};padding:3px 9px;border-radius:6px\">{{ m.rag }}<\u002Fspan>\n                        <span style=\"font-size:11.5px;color:#C2C9D6\">{{ m.baseline }}<\u002Fspan>\n                        <span style=\"font-size:11.5px;color:#C2C9D6\">{{ m.forecast }}<\u002Fspan>\n                        <span style=\"font-size:11px;color:#8B94A6;line-height:1.4\">{{ m.activity }}<\u002Fspan>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n\n                <!-- objective + key info -->\n                <div style=\"display:grid;grid-template-columns:1.2fr 1fr;gap:16px\">\n                  <div style=\"background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:15px;padding:20px 22px\">\n                    <h3 style=\"font-size:15px;font-weight:600;margin-bottom:12px\">High-Level Objective<\u002Fh3>\n                    <p style=\"font-size:12.5px;line-height:1.65;color:#C2C9D6;margin-bottom:12px;text-wrap:pretty\">{{ sel.objective.intro }}<\u002Fp>\n                    <div style=\"display:flex;flex-direction:column;gap:8px\">\n                      <sc-for list=\"{{ sel.objective.bullets }}\" as=\"b\" hint-placeholder-count=\"4\">\n                        <div style=\"display:flex;align-items:flex-start;gap:9px\"><span style=\"width:5px;height:5px;border-radius:50%;background:#00CCFF;margin-top:7px;flex-shrink:0\"><\u002Fspan><span style=\"font-size:12px;color:#C2C9D6;line-height:1.5\">{{ b }}<\u002Fspan><\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:15px;padding:20px 22px\">\n                    <h3 style=\"font-size:15px;font-weight:600;margin-bottom:12px\">Key Project Information<\u002Fh3>\n                    <div style=\"display:flex;flex-direction:column\">\n                      <sc-for list=\"{{ keyInfo }}\" as=\"k\" hint-placeholder-count=\"6\">\n                        <div style=\"display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.05)\"><span style=\"font-size:11.5px;color:#8B94A6\">{{ k.label }}<\u002Fspan><span style=\"font-size:12px;font-weight:500;color:#EAEEF5;text-align:right\">{{ k.value }}<\u002Fspan><\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <!-- finances -->\n                <div style=\"background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:15px;padding:20px 22px\">\n                  <h3 style=\"font-size:15px;font-weight:600;margin-bottom:14px\">Project Finances<\u002Fh3>\n                  <div style=\"display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:0;border:1px solid rgba(255,255,255,0.07);border-radius:11px;overflow:hidden;margin-bottom:14px\">\n                    <div style=\"padding:11px 15px;font-size:11px;font-weight:600;color:#5C6678;background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.06)\"><\u002Fdiv>\n                    <div style=\"padding:11px 15px;font-size:11.5px;font-weight:600;color:#C2C9D6;background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.06);text-align:right\">CapEx<\u002Fdiv>\n                    <div style=\"padding:11px 15px;font-size:11.5px;font-weight:600;color:#C2C9D6;background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.06);text-align:right\">OpEx<\u002Fdiv>\n                    <sc-for list=\"{{ financeRows }}\" as=\"f\" hint-placeholder-count=\"5\">\n                      <div style=\"padding:11px 15px;font-size:12px;font-weight:600;color:#EAEEF5;border-bottom:1px solid rgba(255,255,255,0.04)\">{{ f.label }}<\u002Fdiv>\n                      <div style=\"padding:11px 15px;font-size:12px;color:{{ f.capexColor }};border-bottom:1px solid rgba(255,255,255,0.04);text-align:right\">{{ f.capex }}<\u002Fdiv>\n                      <div style=\"padding:11px 15px;font-size:12px;color:#C2C9D6;border-bottom:1px solid rgba(255,255,255,0.04);text-align:right\">{{ f.opex }}<\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                  <div style=\"background:rgba(255,255,255,0.025);border-radius:10px;padding:13px 15px\"><div style=\"font-size:10.5px;font-weight:600;color:#5C6678;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px\">Finance Summary<\u002Fdiv><p style=\"font-size:12px;line-height:1.6;color:#C2C9D6\">{{ sel.finance.summary }}<\u002Fp><\u002Fdiv>\n                <\u002Fdiv>\n\n                <!-- risks + decisions -->\n                <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n                  <div style=\"background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:15px;padding:20px 22px\">\n                    <h3 style=\"font-size:15px;font-weight:600;margin-bottom:14px\">Key Risks &amp; Issues<\u002Fh3>\n                    <sc-if value=\"{{ hasRisks }}\">\n                      <div style=\"display:flex;flex-direction:column;gap:10px\">\n                        <sc-for list=\"{{ riskRows }}\" as=\"r\" hint-placeholder-count=\"3\">\n                          <div style=\"background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.05);border-radius:10px;padding:13px 14px\">\n                            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px\"><div style=\"display:flex;align-items:center;gap:8px\"><span style=\"font-size:9.5px;font-weight:600;color:#8B94A6;background:rgba(255,255,255,0.05);padding:2px 7px;border-radius:5px\">{{ r.key }}<\u002Fspan><span style=\"font-size:12.5px;font-weight:500\">{{ r.title }}<\u002Fspan><\u002Fdiv><span style=\"font-size:9.5px;font-weight:600;color:{{ r.sevColor }};background:{{ r.sevBg }};padding:2px 8px;border-radius:20px;white-space:nowrap\">{{ r.sev }}<\u002Fspan><\u002Fdiv>\n                            <p style=\"font-size:11px;color:#8B94A6;line-height:1.5;margin-bottom:7px\">{{ r.desc }}<\u002Fp>\n                            <div style=\"font-size:10.5px;color:#5C6678\">Owner: {{ r.owner }} · {{ r.status }}<\u002Fdiv>\n                          <\u002Fdiv>\n                        <\u002Fsc-for>\n                      <\u002Fdiv>\n                    <\u002Fsc-if>\n                    <sc-if value=\"{{ noRisks }}\"><div style=\"display:flex;align-items:center;gap:9px;padding:10px 4px;font-size:12px;color:#5C6678\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#34D399\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#ic-check\"><\u002Fuse><\u002Fsvg>No issues found.<\u002Fdiv><\u002Fsc-if>\n                  <\u002Fdiv>\n                  <div style=\"background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:15px;padding:20px 22px\">\n                    <h3 style=\"font-size:15px;font-weight:600;margin-bottom:14px\">Decisions &amp; Escalations<\u002Fh3>\n                    <sc-if value=\"{{ hasDecisions }}\">\n                      <div style=\"display:flex;flex-direction:column;gap:10px\">\n                        <sc-for list=\"{{ sel.decisions }}\" as=\"d\" hint-placeholder-count=\"2\">\n                          <div style=\"background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.05);border-radius:10px;padding:13px 14px\">\n                            <p style=\"font-size:12.5px;color:#EAEEF5;line-height:1.45;margin-bottom:9px\">{{ d.desc }}<\u002Fp>\n                            <div style=\"display:flex;align-items:center;justify-content:space-between\"><span style=\"font-size:10.5px;color:#8B94A6\">Escalation: {{ d.escalation }}<\u002Fspan><span style=\"font-size:10.5px;font-weight:600;color:#FBBF24\">Resolve by {{ d.due }}<\u002Fspan><\u002Fdiv>\n                          <\u002Fdiv>\n                        <\u002Fsc-for>\n                      <\u002Fdiv>\n                    <\u002Fsc-if>\n                    <sc-if value=\"{{ noDecisions }}\"><div style=\"display:flex;align-items:center;gap:9px;padding:10px 4px;font-size:12px;color:#5C6678\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#34D399\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#ic-check\"><\u002Fuse><\u002Fsvg>No open decisions or escalations.<\u002Fdiv><\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- ====== DEPENDENCIES ====== -->\n          <sc-if value=\"{{ projDeps }}\">\n            <div style=\"display:flex;flex-direction:column;gap:16px\">\n              <div style=\"background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:15px;padding:20px 22px\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:6px\"><h3 style=\"font-size:15px;font-weight:600\">Inter-project dependency map<\u002Fh3>\n                  <div style=\"display:flex;gap:14px\">\n                    <span style=\"font-size:10.5px;color:#8B94A6;display:flex;align-items:center;gap:6px\"><span style=\"width:18px;height:0;border-top:2px solid #34D399\"><\u002Fspan>On track<\u002Fspan>\n                    <span style=\"font-size:10.5px;color:#8B94A6;display:flex;align-items:center;gap:6px\"><span style=\"width:18px;height:0;border-top:2px dashed #FBBF24\"><\u002Fspan>At risk<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <p style=\"font-size:11.5px;color:#5C6678;margin-bottom:8px\">Arrows point from a prerequisite project to the project that depends on it · click a node to open its report<\u002Fp>\n                <div style=\"overflow-x:auto\" class=\"gxscroll\">\n                  <div style=\"position:relative;width:1080px;height:392px;margin:0 auto\">\n                    <svg width=\"1080\" height=\"392\" style=\"position:absolute;inset:0;pointer-events:none\">\n                      <defs>\n                        <marker id=\"arrG\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6.5,3 L0,6 Z\" fill=\"#34D399\"><\u002Fpath><\u002Fmarker>\n                        <marker id=\"arrA\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6.5,3 L0,6 Z\" fill=\"#FBBF24\"><\u002Fpath><\u002Fmarker>\n                        <marker id=\"arrR\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6.5,3 L0,6 Z\" fill=\"#FB7185\"><\u002Fpath><\u002Fmarker>\n                      <\u002Fdefs>\n                      <sc-for list=\"{{ graphEdges }}\" as=\"e\" hint-placeholder-count=\"5\">\n                        <path d=\"{{ e.d }}\" fill=\"none\" stroke=\"{{ e.color }}\" stroke-width=\"2\" stroke-dasharray=\"{{ e.dash }}\" marker-end=\"{{ e.marker }}\" opacity=\"0.85\"><\u002Fpath>\n                      <\u002Fsc-for>\n                    <\u002Fsvg>\n                    <sc-for list=\"{{ graphEdges }}\" as=\"e\" hint-placeholder-count=\"5\">\n                      <sc-if value=\"{{ e.showLabel }}\"><div style=\"{{ e.labelStyle }}\">{{ e.label }}<\u002Fdiv><\u002Fsc-if>\n                    <\u002Fsc-for>\n                    <sc-for list=\"{{ graphNodes }}\" as=\"n\" hint-placeholder-count=\"6\">\n                      <div onclick=\"{{ n.onClick }}\" style=\"{{ n.style }}\" style-hover=\"border-color:#00CCFF\">\n                        <div style=\"display:flex;align-items:center;gap:7px\"><span style=\"width:8px;height:8px;border-radius:50%;background:{{ n.color }};flex-shrink:0\"><\u002Fspan><span style=\"font-size:12px;font-weight:600;color:#EAEEF5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ n.name }}<\u002Fspan><\u002Fdiv>\n                        <div style=\"font-size:10px;color:#5C6678;padding-left:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ n.stage }} · {{ n.pm }}<\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n                <div style=\"background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:15px;padding:20px 22px\">\n                  <h3 style=\"font-size:15px;font-weight:600;margin-bottom:3px\">Cross-project dependencies<\u002Fh3>\n                  <p style=\"font-size:11.5px;color:#5C6678;margin-bottom:14px\">{{ sel.name }} ↔ other projects<\u002Fp>\n                  <sc-if value=\"{{ hasExternalDeps }}\">\n                    <div style=\"display:flex;flex-direction:column;gap:10px\">\n                      <sc-for list=\"{{ externalDeps }}\" as=\"d\" hint-placeholder-count=\"3\">\n                        <div style=\"background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.05);border-left:3px solid {{ d.color }};border-radius:10px;padding:13px 14px\">\n                          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px\"><span style=\"font-size:12.5px;font-weight:500\">{{ d.item }}<\u002Fspan><span style=\"font-size:9.5px;font-weight:600;color:{{ d.color }};background:{{ d.bg }};padding:2px 8px;border-radius:20px;white-space:nowrap\">{{ d.status }}<\u002Fspan><\u002Fdiv>\n                          <div style=\"font-size:11px;color:#8B94A6;margin-bottom:8px\">{{ d.dependsOn }}<\u002Fdiv>\n                          <div style=\"display:flex;align-items:center;justify-content:space-between\"><button onclick=\"{{ d.onTarget }}\" style=\"font-size:10.5px;font-weight:600;color:#00CCFF;background:rgba(0,204,255,0.1);border:1px solid rgba(0,204,255,0.25);border-radius:7px;padding:4px 10px;cursor:pointer;font-family:inherit\">{{ d.targetName }}<\u002Fbutton><span style=\"font-size:10.5px;color:#5C6678\">Owner: {{ d.owner }} · due {{ d.due }}<\u002Fspan><\u002Fdiv>\n                        <\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ noExternalDeps }}\"><div style=\"padding:14px 4px;font-size:12px;color:#5C6678\">This project has no dependencies on other projects.<\u002Fdiv><\u002Fsc-if>\n                <\u002Fdiv>\n\n                <div style=\"background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:15px;padding:20px 22px\">\n                  <h3 style=\"font-size:15px;font-weight:600;margin-bottom:3px\">Internal dependencies<\u002Fh3>\n                  <p style=\"font-size:11.5px;color:#5C6678;margin-bottom:14px\">Task &amp; milestone links within {{ sel.name }}<\u002Fp>\n                  <sc-if value=\"{{ hasInternalDeps }}\">\n                    <div style=\"display:flex;flex-direction:column;gap:10px\">\n                      <sc-for list=\"{{ internalDeps }}\" as=\"d\" hint-placeholder-count=\"2\">\n                        <div style=\"background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.05);border-radius:10px;padding:13px 14px\">\n                          <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:7px\"><span style=\"font-size:12px;color:#EAEEF5\">{{ d.dependsOn }}<\u002Fspan><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#5C6678\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg><span style=\"font-size:12px;font-weight:500;color:#EAEEF5\">{{ d.item }}<\u002Fspan><\u002Fdiv>\n                          <div style=\"display:flex;align-items:center;justify-content:space-between\"><span style=\"font-size:9.5px;font-weight:600;color:{{ d.color }};background:{{ d.bg }};padding:2px 8px;border-radius:20px\">{{ d.status }}<\u002Fspan><span style=\"font-size:10.5px;color:#5C6678\">Owner: {{ d.owner }} · due {{ d.due }}<\u002Fspan><\u002Fdiv>\n                        <\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ noInternalDeps }}\"><div style=\"padding:14px 4px;font-size:12px;color:#5C6678\">No internal task dependencies recorded yet.<\u002Fdiv><\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- ====== CREATE PROJECT MODAL ====== -->\n          <sc-if value=\"{{ projModalOpen }}\">\n            <div onclick=\"{{ closeProjModal }}\" style=\"position:fixed;inset:0;background:rgba(4,8,14,0.66);backdrop-filter:blur(3px);z-index:120;display:flex;align-items:center;justify-content:center;animation:gxfade .2s ease\">\n              <div onclick=\"{{ stop }}\" style=\"width:560px;max-width:92vw;max-height:88vh;overflow-y:auto;background:#111824;border:1px solid rgba(255,255,255,0.1);border-radius:18px;box-shadow:0 30px 80px rgba(0,0,0,0.6)\" class=\"gxscroll\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid rgba(255,255,255,0.07)\">\n                  <div><h3 style=\"font-size:17px;font-weight:600\">New Project<\u002Fh3><p style=\"font-size:11.5px;color:#5C6678;margin-top:3px\">Create a project and start status reporting<\u002Fp><\u002Fdiv>\n                  <button onclick=\"{{ closeProjModal }}\" style=\"width:32px;height:32px;border-radius:9px;border:1px solid rgba(255,255,255,0.08);background:transparent;color:#8B94A6;cursor:pointer;display:flex;align-items:center;justify-content:center\" style-hover=\"background:rgba(255,255,255,0.06)\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><use href=\"#ic-x\"><\u002Fuse><\u002Fsvg><\u002Fbutton>\n                <\u002Fdiv>\n                <div style=\"padding:22px 24px;display:flex;flex-direction:column;gap:16px\">\n                  <div><label style=\"display:block;font-size:11px;font-weight:600;color:#8B94A6;margin-bottom:7px\">Project name<\u002Flabel><input value=\"{{ projForm.name }}\" oninput=\"{{ projFormChange.name }}\" placeholder=\"e.g. Munich Expansion\" style=\"width:100%;box-sizing:border-box;background:#0c121c;border:1px solid rgba(255,255,255,0.1);border-radius:9px;padding:11px 13px;font-size:13px;color:#EAEEF5;font-family:inherit;outline:none\"><\u002Fdiv>\n                  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n                    <div><label style=\"display:block;font-size:11px;font-weight:600;color:#8B94A6;margin-bottom:7px\">Project code <span style=\"font-size:9px;font-weight:600;color:#00CCFF;background:rgba(0,204,255,0.12);border-radius:5px;padding:1px 6px;margin-left:4px\">AUTO<\u002Fspan><\u002Flabel><div style=\"width:100%;box-sizing:border-box;background:rgba(0,204,255,0.06);border:1px dashed rgba(0,204,255,0.3);border-radius:9px;padding:11px 13px;font-size:13px;font-family:monospace;font-weight:600;color:#00CCFF;letter-spacing:0.5px\">{{ nextProjCode }}<\u002Fdiv><\u002Fdiv>\n                    <div><label style=\"display:block;font-size:11px;font-weight:600;color:#8B94A6;margin-bottom:7px\">Project manager<\u002Flabel><input value=\"{{ projForm.pm }}\" oninput=\"{{ projFormChange.pm }}\" style=\"width:100%;box-sizing:border-box;background:#0c121c;border:1px solid rgba(255,255,255,0.1);border-radius:9px;padding:11px 13px;font-size:13px;color:#EAEEF5;font-family:inherit;outline:none\"><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n                    <div><label style=\"display:block;font-size:11px;font-weight:600;color:#8B94A6;margin-bottom:7px\">Programme<\u002Flabel><input value=\"{{ projForm.programme }}\" oninput=\"{{ projFormChange.programme }}\" style=\"width:100%;box-sizing:border-box;background:#0c121c;border:1px solid rgba(255,255,255,0.1);border-radius:9px;padding:11px 13px;font-size:13px;color:#EAEEF5;font-family:inherit;outline:none\"><\u002Fdiv>\n                    <div><label style=\"display:block;font-size:11px;font-weight:600;color:#8B94A6;margin-bottom:7px\">Sponsor<\u002Flabel><input value=\"{{ projForm.sponsor }}\" oninput=\"{{ projFormChange.sponsor }}\" placeholder=\"e.g. Cathy Reed\" style=\"width:100%;box-sizing:border-box;background:#0c121c;border:1px solid rgba(255,255,255,0.1);border-radius:9px;padding:11px 13px;font-size:13px;color:#EAEEF5;font-family:inherit;outline:none\"><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n                    <div><label style=\"display:block;font-size:11px;font-weight:600;color:#8B94A6;margin-bottom:7px\">Methodology <span style=\"font-size:9px;font-weight:600;color:#A78BFA;background:rgba(167,139,250,0.14);border-radius:5px;padding:1px 6px;margin-left:4px\">FIXED AT CREATION<\u002Fspan><\u002Flabel><select value=\"{{ projForm.methodology }}\" onchange=\"{{ projFormChange.methodology }}\" style=\"width:100%;box-sizing:border-box;background:#0c121c;border:1px solid rgba(255,255,255,0.1);border-radius:9px;padding:11px 13px;font-size:13px;color:#EAEEF5;font-family:inherit;outline:none\"><option>OJS Stage Gate<\u002Foption><option>Waterfall<\u002Foption><option>Agile Delivery<\u002Foption><option>Hybrid<\u002Foption><\u002Fselect><\u002Fdiv>\n                    <div><label style=\"display:block;font-size:11px;font-weight:600;color:#8B94A6;margin-bottom:7px\">Current stage<\u002Flabel><select value=\"{{ projForm.stage }}\" onchange=\"{{ projFormChange.stage }}\" style=\"width:100%;box-sizing:border-box;background:#0c121c;border:1px solid rgba(255,255,255,0.1);border-radius:9px;padding:11px 13px;font-size:13px;color:#EAEEF5;font-family:inherit;outline:none\"><sc-for list=\"{{ methodologyStages }}\" as=\"st\" hint-placeholder-count=\"4\"><option>{{ st }}<\u002Foption><\u002Fsc-for><\u002Fselect><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n                    <div><label style=\"display:block;font-size:11px;font-weight:600;color:#8B94A6;margin-bottom:7px\">Size<\u002Flabel><select value=\"{{ projForm.size }}\" onchange=\"{{ projFormChange.size }}\" style=\"width:100%;box-sizing:border-box;background:#0c121c;border:1px solid rgba(255,255,255,0.1);border-radius:9px;padding:11px 13px;font-size:13px;color:#EAEEF5;font-family:inherit;outline:none\"><option>Small<\u002Foption><option>Medium<\u002Foption><option>Large<\u002Foption><\u002Fselect><\u002Fdiv>\n                    <div><label style=\"display:block;font-size:11px;font-weight:600;color:#8B94A6;margin-bottom:7px\">Current status<\u002Flabel><select value=\"{{ projForm.status }}\" onchange=\"{{ projFormChange.status }}\" style=\"width:100%;box-sizing:border-box;background:#0c121c;border:1px solid rgba(255,255,255,0.1);border-radius:9px;padding:11px 13px;font-size:13px;color:#EAEEF5;font-family:inherit;outline:none\"><option>On Track<\u002Foption><option>At Risk<\u002Foption><option>Off Track<\u002Foption><\u002Fselect><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n                    <div><label style=\"display:block;font-size:11px;font-weight:600;color:#8B94A6;margin-bottom:7px\">Forecast end date<\u002Flabel><input value=\"{{ projForm.forecastEnd }}\" oninput=\"{{ projFormChange.forecastEnd }}\" placeholder=\"e.g. 31 Dec 2026\" style=\"width:100%;box-sizing:border-box;background:#0c121c;border:1px solid rgba(255,255,255,0.1);border-radius:9px;padding:11px 13px;font-size:13px;color:#EAEEF5;font-family:inherit;outline:none\"><\u002Fdiv>\n                    <div><label style=\"display:block;font-size:11px;font-weight:600;color:#8B94A6;margin-bottom:7px\">Business group<\u002Flabel><input value=\"{{ projForm.businessGroup }}\" oninput=\"{{ projFormChange.businessGroup }}\" placeholder=\"e.g. Enterprise IT\" style=\"width:100%;box-sizing:border-box;background:#0c121c;border:1px solid rgba(255,255,255,0.1);border-radius:9px;padding:11px 13px;font-size:13px;color:#EAEEF5;font-family:inherit;outline:none\"><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex;align-items:center;justify-content:flex-end;gap:10px;padding:18px 24px;border-top:1px solid rgba(255,255,255,0.07)\">\n                  <button onclick=\"{{ closeProjModal }}\" style=\"font-size:12.5px;font-weight:500;color:#C2C9D6;background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:9px;padding:10px 16px;cursor:pointer;font-family:inherit\">Cancel<\u002Fbutton>\n                  <button onclick=\"{{ createProject }}\" style=\"font-size:12.5px;font-weight:600;color:#06121a;background:#00CCFF;border:none;border-radius:9px;padding:10px 18px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:7px\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#ic-plus\"><\u002Fuse><\u002Fsvg>Create project<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- toast -->\n          <sc-if value=\"{{ projToast }}\">\n            <div style=\"position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:130;background:#0E1B16;border:1px solid rgba(52,211,153,0.4);color:#EAEEF5;font-size:12.5px;font-weight:500;padding:12px 18px;border-radius:11px;box-shadow:0 16px 40px rgba(0,0,0,0.5);display:flex;align-items:center;gap:10px;animation:gxfade .25s ease\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#34D399\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#ic-check\"><\u002Fuse><\u002Fsvg>{{ projToast }}<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ TRAINING ============ -->\n      <sc-if value=\"{{ isTraining }}\">\n        <div>\n          <div style=\"display:flex;gap:14px;margin-bottom:20px\">\n            <sc-for list=\"{{ trainingStats }}\" as=\"st\" hint-placeholder-count=\"4\">\n              <div style=\"flex:1;background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:13px;padding:15px 17px\"><div style=\"font-size:11.5px;color:#8B94A6;margin-bottom:7px\">{{ st.label }}<\u002Fdiv><div style=\"font-size:21px;font-weight:600;letter-spacing:-0.5px;color:{{ st.color }}\">{{ st.value }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1.3fr 1fr;gap:16px\">\n            <div style=\"background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:15px;padding:20px 22px\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:18px\"><h3 style=\"font-size:15px;font-weight:600\">Training matrix<\u002Fh3><div style=\"display:flex;gap:13px\"><span style=\"font-size:10px;color:#8B94A6;display:flex;align-items:center;gap:5px\"><span style=\"width:9px;height:9px;border-radius:3px;background:#34D399\"><\u002Fspan>Complete<\u002Fspan><span style=\"font-size:10px;color:#8B94A6;display:flex;align-items:center;gap:5px\"><span style=\"width:9px;height:9px;border-radius:3px;background:#FBBF24\"><\u002Fspan>Due<\u002Fspan><span style=\"font-size:10px;color:#8B94A6;display:flex;align-items:center;gap:5px\"><span style=\"width:9px;height:9px;border-radius:3px;background:#FB7185\"><\u002Fspan>Overdue<\u002Fspan><\u002Fdiv><\u002Fdiv>\n              <div style=\"display:flex;margin-bottom:10px;padding-left:130px;gap:8px\">\n                <sc-for list=\"{{ courseCols }}\" as=\"c\" hint-placeholder-count=\"5\">\n                  <div style=\"flex:1;font-size:9.5px;color:#8B94A6;text-align:center;line-height:1.2\">{{ c }}<\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:9px\">\n                <sc-for list=\"{{ matrix }}\" as=\"m\" hint-placeholder-count=\"5\">\n                  <div style=\"display:flex;align-items:center;gap:8px\">\n                    <div style=\"width:122px;font-size:12px;color:#C2C9D6\">{{ m.dept }}<\u002Fdiv>\n                    <sc-for list=\"{{ m.cells }}\" as=\"cell\" hint-placeholder-count=\"5\">\n                      <div style=\"flex:1;height:30px;border-radius:7px;background:{{ cell.color }};opacity:0.9\"><\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:15px;padding:20px 22px\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:16px\"><h3 style=\"font-size:15px;font-weight:600\">Courses<\u002Fh3><button style=\"font-size:11px;font-weight:600;color:#06121a;background:#00CCFF;border:none;border-radius:8px;padding:6px 11px;cursor:pointer;font-family:inherit\">Add course<\u002Fbutton><\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:11px\">\n                <sc-for list=\"{{ courseList }}\" as=\"c\" hint-placeholder-count=\"5\">\n                  <div style=\"background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.05);border-radius:11px;padding:13px 14px\">\n                    <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:9px\"><div style=\"display:flex;align-items:center;gap:8px\"><span style=\"font-size:12.5px;font-weight:500\">{{ c.name }}<\u002Fspan><sc-if value=\"{{ c.mandatory }}\"><span style=\"font-size:9px;font-weight:600;color:#00CCFF;background:rgba(0,204,255,0.12);padding:2px 6px;border-radius:5px\">MANDATORY<\u002Fspan><\u002Fsc-if><\u002Fdiv><span style=\"font-size:12px;font-weight:600;color:{{ c.sColor }}\">{{ c.completion }}<\u002Fspan><\u002Fdiv>\n                    <div style=\"display:flex;align-items:center;justify-content:space-between\"><div style=\"flex:1;max-width:160px;height:5px;border-radius:4px;background:rgba(255,255,255,0.07);overflow:hidden\"><div style=\"height:100%;width:{{ c.completion }};background:{{ c.sColor }}\"><\u002Fdiv><\u002Fdiv><span style=\"font-size:10.5px;color:#5C6678\">Renews: {{ c.expiry }}<\u002Fspan><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ ACCESS REVIEWS ============ -->\n      <sc-if value=\"{{ isAccess }}\">\n        <div>\n          <div style=\"display:flex;gap:14px;margin-bottom:20px\">\n            <sc-for list=\"{{ accessStats }}\" as=\"st\" hint-placeholder-count=\"4\">\n              <div style=\"flex:1;background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:13px;padding:15px 17px\"><div style=\"font-size:11.5px;color:#8B94A6;margin-bottom:7px\">{{ st.label }}<\u002Fdiv><div style=\"font-size:21px;font-weight:600;letter-spacing:-0.5px;color:{{ st.color }}\">{{ st.value }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:340px 1fr;gap:16px\">\n            <div style=\"background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:15px;padding:18px 20px\">\n              <h3 style=\"font-size:14px;font-weight:600;margin-bottom:14px\">Review schedule<\u002Fh3>\n              <div style=\"display:flex;flex-direction:column;gap:10px\">\n                <sc-for list=\"{{ reviews }}\" as=\"r\" hint-placeholder-count=\"4\">\n                  <div style=\"background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.05);border-radius:11px;padding:13px 14px\">\n                    <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:5px\"><span style=\"font-size:12.5px;font-weight:500;line-height:1.3\">{{ r.name }}<\u002Fspan><span style=\"font-size:9.5px;font-weight:600;color:{{ r.sColor }};background:{{ r.sBg }};padding:3px 8px;border-radius:20px;white-space:nowrap\">{{ r.status }}<\u002Fspan><\u002Fdiv>\n                    <div style=\"font-size:10.5px;color:#8B94A6;margin-bottom:9px\">{{ r.scope }} · due {{ r.due }}<\u002Fdiv>\n                    <div style=\"display:flex;align-items:center;gap:8px\"><div style=\"flex:1;height:5px;border-radius:4px;background:rgba(255,255,255,0.07);overflow:hidden\"><div style=\"height:100%;width:{{ r.progress }};background:{{ r.sColor }}\"><\u002Fdiv><\u002Fdiv><span style=\"font-size:10px;color:#5C6678\">{{ r.progress }}<\u002Fspan><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:15px;padding:20px 22px\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:14px\"><div><h3 style=\"font-size:15px;font-weight:600\">Q2 Privileged Access Review<\u002Fh3><p style=\"font-size:11.5px;color:#5C6678;margin-top:2px\">Certify each user's access · ISO 27001 A.5.18<\u002Fp><\u002Fdiv><button style=\"font-size:11px;font-weight:600;color:#06121a;background:#00CCFF;border:none;border-radius:8px;padding:7px 13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#ic-download\"><\u002Fuse><\u002Fsvg>Export evidence<\u002Fbutton><\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:1.4fr 1.4fr 1fr 1fr 1fr;padding:0 4px 11px;font-size:10px;font-weight:600;letter-spacing:0.5px;color:#5C6678;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,0.06)\"><span>User<\u002Fspan><span>System<\u002Fspan><span>Access<\u002Fspan><span>Last used<\u002Fspan><span>Decision<\u002Fspan><\u002Fdiv>\n              <sc-for list=\"{{ reviewItems }}\" as=\"i\" hint-placeholder-count=\"5\">\n                <div style=\"display:grid;grid-template-columns:1.4fr 1.4fr 1fr 1fr 1fr;align-items:center;padding:13px 4px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12.5px\">\n                  <span style=\"font-weight:500\">{{ i.user }}<\u002Fspan><span style=\"color:#C2C9D6\">{{ i.system }}<\u002Fspan><span style=\"color:#8B94A6\">{{ i.access }}<\u002Fspan><span style=\"color:#8B94A6;font-size:11.5px\">{{ i.last }}<\u002Fspan>\n                  <span><span style=\"font-size:11px;font-weight:600;color:{{ i.dColor }};border:1px solid {{ i.dColor }}33;padding:3px 10px;border-radius:7px\">{{ i.decision }}<\u002Fspan><\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ ASSET REGISTER ============ -->\n      <sc-if value=\"{{ isAssets }}\">\n        <div>\n          <div style=\"display:flex;gap:14px;margin-bottom:20px\">\n            <sc-for list=\"{{ assetStats }}\" as=\"st\" hint-placeholder-count=\"4\">\n              <div style=\"flex:1;background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:13px;padding:15px 17px\"><div style=\"font-size:11.5px;color:#8B94A6;margin-bottom:7px\">{{ st.label }}<\u002Fdiv><div style=\"font-size:21px;font-weight:600;letter-spacing:-0.5px;color:{{ st.color }}\">{{ st.value }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:11px;margin-bottom:16px\">\n            <sc-for list=\"{{ assetCategories }}\" as=\"c\" hint-placeholder-count=\"5\">\n              <div style=\"flex:1;background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:14px 16px\"><div style=\"display:flex;align-items:center;gap:8px;margin-bottom:8px\"><span style=\"width:9px;height:9px;border-radius:3px;background:{{ c.color }}\"><\u002Fspan><span style=\"font-size:21px;font-weight:600\">{{ c.count }}<\u002Fspan><\u002Fdiv><div style=\"font-size:11px;color:#8B94A6\">{{ c.name }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:15px;padding:20px 22px\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:14px\"><h3 style=\"font-size:15px;font-weight:600\">Asset register<\u002Fh3><button style=\"font-size:11px;font-weig 11px;font-weight:600;color:{{ a.sColor }}\">{{ a.status }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ PURCHASE ORDERS ============ -->\n      <sc-if value=\"{{ isPos }}\">\n        <div style=\"animation:gxfade .3s ease\">\n          <div style=\"display:flex;gap:14px;margin-bottom:20px\">\n            <sc-for list=\"{{ poStats }}\" as=\"st\" hint-placeholder-count=\"4\">\n              <div style=\"flex:1;background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:13px;padding:15px 17px\"><div style=\"font-size:11.5px;color:#8B94A6;margin-bottom:7px\">{{ st.label }}<\u002Fdiv><div style=\"font-size:21px;font-weight:600;letter-spacing:-0.5px;color:{{ st.color }}\">{{ st.value }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"background:#121925;border:1px solid rgba(255,255,255,0.06);border-radius:15px;padding:20px 22px\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:6px\"><div><h3 style=\"font-size:15px;font-weight:600\">Purchase orders<\u002Fh3><p style=\"font-size:11.5px;color:#5C6678;margin-top:3px\">Raise an order, attach the invoice, then route for manager &amp; director sign-off<\u002Fp><\u002Fdiv>\n              <sc-if value=\"{{ poCanRaise }}\"><button onclick=\"{{ openPoModal }}\" style=\"font-size:12px;font-weight:600;color:#06121a;background:#00CCFF;border:none;border-radius:9px;padding:9px 15px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:7px\" style-hover=\"filter:brightness(1.08)\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#ic-plus\"><\u002Fuse><\u002Fsvg>Raise PO<\u002Fbutton><\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-templ
